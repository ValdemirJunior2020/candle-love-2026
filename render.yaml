services:
  - type: web
    name: candle-love-api
    runtime: node
    plan: starter
    region: virginia
    rootDir: server
    buildCommand: npm ci --no-audit --no-fund && npm run build
    preDeployCommand: npm run db:migrate:prod
    startCommand: npm run start
    healthCheckPath: /api/ready
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 30
    buildFilter:
      paths:
        - server/**
        - render.yaml
      ignoredPaths:
        - server/**/*.md
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVER_NAME
        value: candle-love-api
      - key: DATABASE_URL
        fromDatabase:
          name: candle-love-postgres
          property: connectionString
      - key: DATABASE_SSL
        value: true
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads
      - key: MAX_PROFILE_PHOTO_MB
        value: 8
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL_MINUTES
        value: 15
      - key: REFRESH_TOKEN_TTL_DAYS
        value: 30
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 120
      - key: LOG_LEVEL
        value: info
      - key: SPARK_PACK_50_PRODUCT_ID
        value: candle_sparks_50
      - key: SPARK_PACK_140_PRODUCT_ID
        value: candle_sparks_140
      - key: SPARK_PACK_320_PRODUCT_ID
        value: candle_sparks_320
    disk:
      name: candle-love-media
      mountPath: /opt/render/project/src/uploads
      sizeGB: 5

databases:
  - name: candle-love-postgres
    plan: basic-256mb
    region: virginia
    postgresMajorVersion: '17'
    databaseName: candle_love
    user: candle_app
    ipAllowList: []
